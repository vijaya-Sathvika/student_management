<!DOCTYPE html>
<html>
<head>
  <title>Add Student</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- Navbar here -->
 <nav class="navbar navbar-expand-lg fixed-top">
  <div class="container">
    <a class="navbar-brand">Student Result System 🎓</a>
    <div>
      <a class="nav-link d-inline" href="/home">Home</a>
      <a class="nav-link d-inline" href="/add">Add</a>
      <a class="nav-link d-inline" href="/students">View</a>
      <a class="nav-link d-inline" href="/search">Search</a>
      <a class="nav-link d-inline text-warning" href="/logout">Logout</a>
    </div>
  </div>
</nav>

<div class="container page-container">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card p-4">
        <h3 class="card-title text-center text-success">➕ Add Student</h3>
        <form method="post">
          <input class="form-control mb-3" name="roll_no" placeholder="Roll Number" required>
          <input class="form-control mb-3" name="name" placeholder="Student Name" required>
          <input class="form-control mb-3" name="marks" placeholder="Marks" type="number" required>
          <button class="btn btn-custom w-100">Add Student</button>
        </form>
      </div>
    </div>
  </div>
</div>

</body>
</html>
