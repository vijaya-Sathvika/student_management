<!DOCTYPE html>
<html>
<head>
  <title>View Students</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- Navbar here -->
 <nav class="navbar navbar-expand-lg fixed-top">
  <div class="container">
    <a class="navbar-brand">Student Result System 🎓</a>
    <div>
      <a class="nav-link d-inline" href="/home">Home</a>
      <a class="nav-link d-inline" href="/add">Add</a>
      <a class="nav-link d-inline" href="/students">View</a>
      <a class="nav-link d-inline" href="/search">Search</a>
      <a class="nav-link d-inline text-warning" href="/logout">Logout</a>
    </div>
  </div>
</nav>

<div class="container page-container">
  <div class="card p-4">
    <h3 class="text-center text-info">📋 Student Records</h3>
    <table class="table table-hover table-striped mt-4">
      <thead>
        <tr>
          <th>Roll No</th>
          <th>Name</th>
          <th>Marks</th>
          <th>Grade</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for s in students %}
        <tr>
          <td>{{ s.roll_no }}</td>
          <td>{{ s.name }}</td>
          <td>{{ s.marks }}</td>
          <td><span class="badge bg-primary badge-grade">{{ s.grade }}</span></td>
          <td>
            <a href="/update/{{ s.id }}" class="btn btn-warning btn-sm">Edit</a>
            <a href="/delete/{{ s.id }}" class="btn btn-danger btn-sm">Delete</a>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>

</body>
</html>
