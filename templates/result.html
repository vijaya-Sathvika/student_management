<!DOCTYPE html>
<html>
<head>
  <title>Result</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- Navbar here -->
<nav class="navbar navbar-expand-lg fixed-top">
  <div class="container">
    <a class="navbar-brand">Student Result System 🎓</a>
    <div>
      <a class="nav-link d-inline" href="/home">Home</a>
      <a class="nav-link d-inline" href="/add">Add</a>
      <a class="nav-link d-inline" href="/students">View</a>
      <a class="nav-link d-inline" href="/search">Search</a>
      <a class="nav-link d-inline text-warning" href="/logout">Logout</a>
    </div>
  </div>
</nav>



<div class="container page-container">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="result-card text-center">
        {% if student %}
          <h3 class="text-success">🎉 Result</h3>
          <p><strong>Roll No:</strong> {{ student.roll_no }}</p>
          <p><strong>Name:</strong> {{ student.name }}</p>
          <p><strong>Marks:</strong> {{ student.marks }}</p>
          <p>
            <strong>Grade:</strong>
            <span class="badge bg-success badge-grade">{{ student.grade }}</span>
          </p>
        {% else %}
          <h4 class="text-danger">❌ Student Not Found</h4>
        {% endif %}
      </div>
    </div>
  </div>
</div>

</body>
</html>
